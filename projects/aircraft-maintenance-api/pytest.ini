[pytest]
asyncio_mode = auto
# The SQLAlchemy async engine is created once at module import and bound to
# whichever event loop first uses it. pytest-asyncio's default is a fresh
# loop per test function, which breaks pooled asyncpg connections across
# tests. Pin all async tests to one session-scoped loop to match.
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
